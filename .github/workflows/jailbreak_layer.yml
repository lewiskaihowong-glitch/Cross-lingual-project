name: Jailbreak Layer Evaluation

on:
  workflow_dispatch:
    inputs:
      data_path:
        description: 'CSV file inside data/final/ to evaluate (for example: jailbreak_dataset_Amharic.csv)'
        required: true
        type: string
      language:
        description: 'Language label used for output naming and query resolution'
        required: true
        type: choice
        options:
          - English
          - Amharic
          - Korean
          - Irish
          - Hindi
          - Spanish
        default: Amharic
      model_name:
        description: 'Model to evaluate'
        required: true
        type: choice
        default: 'gpt-5-mini'
        options:
          - gpt-5-mini
          - deepseek-v3.2
          - 2.5-flash
          - kimi-k2.5
          - mistral-large-3
      query_source:
        description: 'Dataset column to use as the model query'
        required: true
        type: choice
        default: auto
        options:
          - auto
          - question
          - translated_query
          - original_query
      system_prompt_language:
        description: 'Safety system prompt language used during evaluation'
        required: true
        type: choice
        default: English
        options:
          - none
          - English
          - Amharic
          - Korean
          - Irish
          - Hindi
          - Spanish
      system_prompt_text:
        description: 'Optional custom system prompt text (overrides system_prompt_language)'
        required: false
        type: string
        default: ''
      output_tag:
        description: 'Optional output filename suffix for the run'
        required: false
        type: string
        default: 'jailbreak-layer'

jobs:
  evaluate-llm:
    runs-on: ubuntu-latest
    env:
      PIP_INDEX_URL: https://pypi.org/simple

    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade "pip<26"
          python -m pip --version
          python -m pip install --retries 5 --timeout 60 --index-url https://pypi.org/simple -r requirements.txt

      - name: Create output directory
        run: mkdir -p data/evaluation_results

      - name: Run jailbreak-layer evaluation
        env:
          AZURE_API_KEY: ${{ secrets.AZURE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python main_evaluate_llm.py \
            "${{ github.event.inputs.data_path }}" \
            "${{ github.event.inputs.model_name }}" \
            "${{ github.event.inputs.language }}" \
            --query-source "${{ github.event.inputs.query_source }}" \
            --system-prompt-language "${{ github.event.inputs.system_prompt_language }}" \
            --system-prompt-text "${{ github.event.inputs.system_prompt_text }}" \
            --output-tag "${{ github.event.inputs.output_tag }}"

      - name: Upload result artifact
        uses: actions/upload-artifact@v4
        with:
          name: jailbreak-layer-${{ github.event.inputs.language }}-${{ github.event.inputs.model_name }}-${{ github.run_number }}
          path: data/evaluation_results/
          if-no-files-found: error

      - name: Display completion message
        run: |
          echo "Jailbreak-layer evaluation completed successfully."
          echo "Artifact: jailbreak-layer-${{ github.event.inputs.language }}-${{ github.event.inputs.model_name }}-${{ github.run_number }}"
