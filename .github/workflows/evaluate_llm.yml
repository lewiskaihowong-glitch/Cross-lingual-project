name: Evaluate LLM on Harmful Dataset

on:
  workflow_dispatch:
    inputs:
        dataset:
            description: 'Dataset to use'
            required: true
            default: 'english.csv'

        model_name:
            description: 'Model to evaluate'
            required: true
            default: 'gpt-5-mini'


jobs:
  create-dataset:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      actions: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Create output directory
      run: mkdir -p data/evaluation_results
    
    - name: Extract language from dataset name
      run: |
        DATASET_NAME="${{ github.event.inputs.dataset }}"
        # Extract language from patterns like "final_dataset_Amharic_100.csv"
        LANGUAGE=$(echo "$DATASET_NAME" | sed 's/final_dataset_\([^_]*\)_*.*/\1/' | sed 's/\.csv$//')
        echo "LANGUAGE=$LANGUAGE" >> $GITHUB_ENV
        echo "Extracted language: $LANGUAGE"
    
    - name: Debug - Check directory structure before
      run: |
        echo "Current working directory:"
        pwd
        echo "Directory contents:"
        ls -la
        echo "Data directory contents:"
        ls -la data/ || echo "data/ directory doesn't exist"
        echo "Final directory contents:"
        ls -la data/evaluation_results/ || echo "data/evaluation_results/ directory doesn't exist"
    
    - name: Run pipeline
      env:
        AZURE_API_KEY: ${{ secrets.AZURE_API_KEY }}
      
      run: |
        python main_evaluate_llm.py "${{ github.event.inputs.dataset }}" "${{ github.event.inputs.model_name }}"
    
    - name: Debug - Check directory structure after
      run: |
        echo "Directory contents after pipeline:"
        ls -la
        echo "Data directory contents:"
        ls -la data/ || echo "data/ directory doesn't exist"
        echo "Evaluation results directory contents:"
        ls -la data/evaluation_results/ || echo "data/evaluation_results/ directory doesn't exist"
    
    - name: Commit and push results to repository
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/evaluation_results/evaluation_results_${{ github.event.inputs.model_name }}_${{ env.LANGUAGE }}.csv
        if [ -n "$(git status --porcelain)" ]; then
          git commit -m "Add evaluation results for ${{ env.LANGUAGE }} using ${{ github.event.inputs.model_name }}"
          git push
          echo "Results committed and pushed to repository"
        else
          echo "No changes to commit"
        fi
    
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: evaluation-results-${{ env.LANGUAGE }}-${{ github.event.inputs.model_name }}-${{ github.run_number }}
        path: data/evaluation_results/

    - name: Display completion message
      run: |
        echo "Pipeline completed successfully!"
        echo "Results uploaded as artifact: evaluation-results-${{ env.LANGUAGE }}-${{ github.event.inputs.model_name }}-${{ github.run_number }}"