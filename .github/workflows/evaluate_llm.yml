name: Evaluate LLM on Harmful Dataset

on:
  workflow_dispatch:
    inputs:
        language:
            description: 'Language to evaluate'
            required: true
            type: choice
            options:
              - English
              - Amharic
              - Korean
              - Irish
              - Hindi
              - Spanish
            default: Amharic

        model_name:
            description: 'Model to evaluate'
            required: true
            type: choice
            default: 'gpt-5-mini'
            options:
              - gpt-5-mini
              - deepseek-v3.2
              - 2.5-flash
              - kimi-k2.5
              - mistral-large-3

        query_source:
          description: 'Dataset column to use for model query'
          required: true
          type: choice
          default: auto
          options:
            - auto
            - question
            - translated_query
            - original_query

        system_prompt_language:
          description: 'Built-in system prompt language (or none)'
          required: true
          type: choice
          default: none
          options:
            - none
            - dataset
            - English
            - Amharic
            - Korean
            - Irish
            - Hindi
            - Spanish

        system_prompt_text:
          description: 'Custom system prompt text (optional; overrides system_prompt_language)'
          required: false
          type: string
          default: ''

        output_tag:
          description: 'Optional output filename suffix (leave blank to auto-generate for system-prompt runs)'
          required: false
          type: string
          default: ''

jobs:
  evaluate-llm:
    runs-on: ubuntu-latest
    env:
      PIP_INDEX_URL: https://pypi.org/simple

    permissions:
      contents: write
      actions: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'


    - name: Install dependencies
      run: |
        python -m pip install --upgrade "pip<26"
        python -m pip --version
        python -m pip install --retries 5 --timeout 60 --index-url https://pypi.org/simple -r requirements.txt
    
    - name: Create output directory
      run: mkdir -p data/evaluation_results
    
    - name: Debug - Check directory structure before
      run: |
        echo "Current working directory:"
        pwd
        echo "Directory contents:"
        ls -la
        echo "Data directory contents:"
        ls -la data/ || echo "data/ directory doesn't exist"
        echo "Final directory contents:"
        ls -la data/evaluation_results/ || echo "data/evaluation_results/ directory doesn't exist"
    
    - name: Run pipeline
      env:
        AZURE_API_KEY: ${{ secrets.AZURE_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      
      run: |
        python main_evaluate_llm.py \
          "final_dataset_${{ github.event.inputs.language }}.csv" \
          "${{ github.event.inputs.model_name }}" \
          "${{ github.event.inputs.language }}" \
          --query-source "${{ github.event.inputs.query_source }}" \
          --system-prompt-language "${{ github.event.inputs.system_prompt_language }}" \
          --system-prompt-text "${{ github.event.inputs.system_prompt_text }}" \
          --output-tag "${{ github.event.inputs.output_tag }}"
    
    - name: Debug - Check directory structure after
      run: |
        echo "Directory contents after pipeline:"
        ls -la
        echo "Data directory contents:"
        ls -la data/ || echo "data/ directory doesn't exist"
        echo "Evaluation results directory contents:"
        ls -la data/evaluation_results/ || echo "data/evaluation_results/ directory doesn't exist"
    
    - name: Commit and push results to repository
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git pull origin main
        git add data/evaluation_results/
        if [ -n "$(git status --porcelain)" ]; then
          git commit -m "Add evaluation results for ${{ github.event.inputs.language }} using ${{ github.event.inputs.model_name }} (query_source=${{ github.event.inputs.query_source }}, sys_prompt=${{ github.event.inputs.system_prompt_language }})"
          git push
          echo "Results committed and pushed to repository"
        else
          echo "No changes to commit"
        fi
    
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: evaluation-results-${{ github.event.inputs.language }}-${{ github.event.inputs.model_name }}-${{ github.run_number }}
        path: data/evaluation_results/

    - name: Display completion message
      run: |
        echo "Pipeline completed successfully!"
        echo "Results uploaded as artifact: evaluation-results-${{ github.event.inputs.language }}-${{ github.event.inputs.model_name }}-${{ github.run_number }}"