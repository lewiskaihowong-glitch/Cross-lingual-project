name: Evaluate LLM on Harmful Dataset

on:
  workflow_dispatch:
    inputs:
        language:
            description: 'Language to evaluate'
            required: true
            type: choice
            options:
              - English
              - Amharic
              - Korean
              - Irish
              - Hindi
              - Spanish
            default: Amharic

        model_name:
            description: 'Model to evaluate'
            required: true
            type: choice
            default: 'gpt-5-mini'
            options:
              - gpt-5-mini
              - deepseek-v3.2
              - 2.5-flash
              - kimi-k2.5
              - mistral-large-3

        two_pass_judge:
            description: 'Enable two-pass judging (extra leakage audit call for responses initially labelled REFUSAL)'
            required: false
            type: boolean
            default: false


jobs:
  evaluate-llm:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      actions: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Create output directory
      run: mkdir -p data/evaluation_results
    
    - name: Debug - Check directory structure before
      run: |
        echo "Current working directory:"
        pwd
        echo "Directory contents:"
        ls -la
        echo "Data directory contents:"
        ls -la data/ || echo "data/ directory doesn't exist"
        echo "Final directory contents:"
        ls -la data/evaluation_results/ || echo "data/evaluation_results/ directory doesn't exist"
    
    - name: Run pipeline
      env:
        AZURE_API_KEY: ${{ secrets.AZURE_API_KEY }},
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      
      run: |
        TWO_PASS_FLAG=""
        if [ "${{ github.event.inputs.two_pass_judge }}" = "true" ]; then
          TWO_PASS_FLAG="--two_pass_judge"
        fi
        python main_evaluate_llm.py "final_dataset_${{ github.event.inputs.language }}.csv" "${{ github.event.inputs.model_name }}" "${{ github.event.inputs.language }}" $TWO_PASS_FLAG
    
    - name: Debug - Check directory structure after
      run: |
        echo "Directory contents after pipeline:"
        ls -la
        echo "Data directory contents:"
        ls -la data/ || echo "data/ directory doesn't exist"
        echo "Evaluation results directory contents:"
        ls -la data/evaluation_results/ || echo "data/evaluation_results/ directory doesn't exist"
    
    - name: Commit and push results to repository
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git pull origin main
        git add data/evaluation_results/evaluation_results_${{ github.event.inputs.model_name }}_${{ github.event.inputs.language }}.json
        if [ -n "$(git status --porcelain)" ]; then
          git commit -m "Add evaluation results for ${{ github.event.inputs.language }} using ${{ github.event.inputs.model_name }}"
          git push
          echo "Results committed and pushed to repository"
        else
          echo "No changes to commit"
        fi
    
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: evaluation-results-${{ github.event.inputs.language }}-${{ github.event.inputs.model_name }}-${{ github.run_number }}
        path: data/evaluation_results/

    - name: Display completion message
      run: |
        echo "Pipeline completed successfully!"
        echo "Results uploaded as artifact: evaluation-results-${{ github.event.inputs.language }}-${{ github.event.inputs.model_name }}-${{ github.run_number }}"