name: Translation Pipeline

on:
  workflow_dispatch:
    inputs:
      data_file:
        description: 'Input CSV filename (without path)'
        required: true
        default: 'english.csv'
      language:
        description: 'Target language for translation'
        required: true
        default: 'Spanish'
      num_samples:
        description: 'Number of samples to process'
        required: true
        default: '1'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Create output directory
      run: mkdir -p data/final
    
    - name: Run pipeline
      env:
        # GitHub Secrets - you need to add these to your repo
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
        # Add any other API keys your services need
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      run: |
        python main.py "${{ github.event.inputs.data_file }}" "${{ github.event.inputs.language }}" ${{ github.event.inputs.num_samples }}
    
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: translation-results-${{ github.event.inputs.language }}-${{ github.run_number }}
        path: data/final/

    - name: Display completion message
      run: |
        echo "🎉 Pipeline completed successfully!"
        echo "📁 Results uploaded as artifact: translation-results-${{ github.event.inputs.language }}-${{ github.run_number }}"