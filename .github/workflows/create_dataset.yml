name: Create Dataset

on:
  workflow_dispatch:
    inputs:
      language:
        description: 'Language to process (e.g., English, Spanish)'
        required: true
        default: 'English'
      num_samples:
        description: 'Number of samples to process'
        required: true
        default: '8'
      dataset:
        description: 'Dataset to use'
        required: true
        default: 'english.csv'

jobs:
  create-dataset:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      actions: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Create output directory
      run: mkdir -p data/final
    
    - name: Debug - Check directory structure before
      run: |
        echo "Current working directory:"
        pwd
        echo "Directory contents:"
        ls -la
        echo "Data directory contents:"
        ls -la data/ || echo "data/ directory doesn't exist"
        echo "Final directory contents:"
        ls -la data/final/ || echo "data/final/ directory doesn't exist"
    
    - name: Run pipeline
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
      
      run: |
        python main_create_dataset.py "${{ github.event.inputs.dataset }}" "${{ github.event.inputs.language }}" ${{ github.event.inputs.num_samples }}
    
    - name: Debug - Check directory structure after
      run: |
        echo "Directory contents after pipeline:"
        ls -la
        echo "Data directory contents:"
        ls -la data/ || echo "data/ directory doesn't exist"
        echo "Final directory contents:"
        ls -la data/final/ || echo "data/final/ directory doesn't exist"
    
    - name: Commit and push results to repository
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git pull
        git add data/final/final_dataset_${{ github.event.inputs.language }}.csv
        if [ -n "$(git status --porcelain)" ]; then
          git commit -m "Add final_dataset_${{ github.event.inputs.language }}.csv"
          git push
          echo "Results committed and pushed to repository"
        else
          echo "No changes to commit"
        fi
    
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: translation-results-${{ github.event.inputs.language }}-${{ github.run_number }}
        path: data/final/

    - name: Display completion message
      run: |
        echo "Pipeline completed successfully!"
        echo "Results uploaded as artifact: translation-results-${{ github.event.inputs.language }}-${{ github.run_number }}"