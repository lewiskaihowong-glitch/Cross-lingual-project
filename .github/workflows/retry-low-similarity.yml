name: Retry Low Similarity Translations

on:
  workflow_dispatch:
    inputs:
      language:
        description: Language to process
        required: true
        type: choice
        default: all
        options:
          - all
          - English
          - Amharic
          - Korean
          - Irish
          - Hindi
          - Spanish
      threshold:
        description: Retry rows with similarity below this value
        required: false
        default: '0.95'
        type: string
      dry_run:
        description: Preview only, do not modify files
        required: false
        default: false
        type: boolean

jobs:
  retry-low-similarity:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run retry script
        env:
          AZURE_API_KEY: ${{ secrets.AZURE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
        run: |
          CMD="python main_retry_low_similarity.py --threshold ${{ inputs.threshold }} --no-backup"

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            CMD="$CMD --dry-run"
          fi

          if [ "${{ inputs.language }}" != "all" ]; then
            CMD="$CMD --language '${{ inputs.language }}'"
          fi

          echo "Running: $CMD"
          eval "$CMD"

      - name: Check for changes
        id: git-check
        if: ${{ inputs.dry_run != true }}
        run: |
          if [ -n "$(git status --porcelain -- data/final/final_dataset_*_refined.csv)" ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: ${{ inputs.dry_run != true && steps.git-check.outputs.changes == 'true' }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git pull
          git add data/final/final_dataset_*_refined.csv
          git commit -m "chore: retry low-similarity translations [skip ci]"
          git push

      - name: No changes detected
        if: ${{ inputs.dry_run != true && steps.git-check.outputs.changes != 'true' }}
        run: echo "No low-similarity updates were needed"
