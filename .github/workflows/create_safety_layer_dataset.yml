name: Create Safety Layer Dataset

on:
  workflow_dispatch:

jobs:
  create-safety-layer-dataset:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create focused safety layer datasets
        run: |
          python safety_layer_dataset_creation.py

      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code data/final/safety_layer_dataset*.csv data/failures_per_model_language.json || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git pull
          git add data/final/safety_layer_dataset*.csv data/failures_per_model_language.json
          git commit -m "chore: regenerate focused safety layer datasets [skip ci]"
          git push

      - name: No changes detected
        if: steps.git-check.outputs.changes != 'true'
        run: echo "No dataset changes detected"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: safety-layer-datasets-${{ github.run_number }}
          path: |
            data/final/safety_layer_dataset*.csv
            data/failures_per_model_language.json
